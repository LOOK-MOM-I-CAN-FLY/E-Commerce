<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузить товар</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <h1>Загрузить цифровой товар</h1>
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <label>Название:</label><input type="text" name="title" required><br>
        <label>Описание:</label><textarea name="description" required></textarea><br>
        <label>Файл:</label><input type="file" name="file" required><br>
        <button type="submit">Загрузить</button>
    </form>
</body>
</html>
