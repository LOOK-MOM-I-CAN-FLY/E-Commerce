<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - Digital Marketplace</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <header>
    <nav>
      <ul>
        <li><a href="/">Главная</a></li>
        <li><a href="/products">Товары</a></li>
        <li><a href="/login">Войти</a></li>
        <li><a href="/register">Регистрация</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="form-container slide-in-up">
        <h1>Вход</h1>
        <!-- Add error message display if needed (needs backend logic) -->
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div style="text-align: center;">
                <button type="submit" class="btn">Войти</button>
            </div>
        </form>
        <p style="text-align: center; margin-top: 20px;">Нет аккаунта? <a href="/register">Зарегистрируйтесь</a></p>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 Digital Marketplace. Все права защищены.</p>
  </footer>

  <script src="/static/js/main.js" defer></script>
</body>
</html>
